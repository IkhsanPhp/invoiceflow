<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Login - Invoice Management System</title><style>body{margin:0;padding:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background-color:#f4f7f9;display:flex;justify-content:center;align-items:center;height:600px;width:800px;overflow:hidden}.login-card{background:#ffffff;width:360px;padding:40px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.05);border:1px solid #e1e8ed}.brand-section{text-align:center;margin-bottom:30px}.brand-logo{width:48px;height:48px;background:#3b82f6;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:24px;margin-bottom:12px}.brand-name{font-size:20px;font-weight:700;color:#1e293b;margin:0}.brand-subtitle{font-size:13px;color:#64748b;margin-top:4px}.form-group{margin-bottom:20px}.form-label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}.form-input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;box-sizing:border-box;transition:border-color 0.2s}.form-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}.role-selector{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;background-color:#fff;cursor:pointer}.login-btn{width:100%;padding:12px;background-color:#3b82f6;color:white;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:10px}.login-btn:hover{background-color:#2563eb}.footer-links{margin-top:24px;text-align:center;font-size:13px;color:#64748b}.footer-links a{color:#3b82f6;text-decoration:none}.footer-links a:hover{text-decoration:underline}.divider{display:flex;align-items:center;margin:20px 0;color:#94a3b8;font-size:12px}.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}.divider span{padding:0 10px}</style></head><body><div class='login-card'><div class='brand-section'><div class='brand-logo'>I</div><h1 class='brand-name'>InvoiceHub</h1><p class='brand-subtitle'>OCR & Verification Management System</p></div><form onsubmit='return false'><div class='form-group'><label class='form-label'>Email Address</label><input type='email' class='form-input' placeholder='name@company.com' required></div><div class='form-group'><label class='form-label'>Password</label><input type='password' class='form-input' placeholder='••••••••' required></div><div class='form-group'><label class='form-label'>Access Role</label><select class='role-selector' required><option value='' disabled selected>Select your role</option><option value='vendor'>Vendor</option><option value='procurement'>Admin Procurement</option><option value='finance'>Finance</option><option value='superadmin'>Super Admin</option></select></div><button type='submit' class='login-btn'>Sign In</button></form><div class='divider'><span>OR</span></div><div class='footer-links'><a href='#'>Forgot password?</a><br><p style='margin-top:10px'>Don't have a vendor account? <a href='#'>Register here</a></p></div></div></body></html>
